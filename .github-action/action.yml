name: "Calcis LLM Cost Estimate"
author: "Calcis"
description: "Automatically estimate LLM API costs for prompt files changed in a PR. Posts a cost breakdown table as a comment."
branding:
  icon: "dollar-sign"
  color: "green"
inputs:
  api-key:
    description: "Calcis API key (starts with calc_). Get one at https://calcis.dev/dashboard"
    required: true
  model:
    description: "LLM model to estimate costs for (e.g. claude-sonnet-4-6, gpt-4o, gemini-2-5-flash)"
    required: false
    default: "claude-sonnet-4-6"
  file-patterns:
    description: "Comma-separated glob patterns for prompt files to scan"
    required: false
    default: "**/*.prompt,**/prompts/**"
  max-files:
    description: "Maximum number of files to estimate per run (prevents excessive API calls)"
    required: false
    default: "10"
outputs:
  total-cost:
    description: "Total estimated cost in USD"
  files-scanned:
    description: "Number of prompt files scanned"
  files-skipped:
    description: "Number of files skipped (over limit, too large, or empty)"
runs:
  using: "node20"
  main: "dist/index.js"
